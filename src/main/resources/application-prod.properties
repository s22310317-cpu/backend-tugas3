# Production Configuration

# Server Configuration
server.port=${SERVER_PORT:8443}
server.servlet.context-path=/
spring.application.name=Auth JWT Spring Security

# Database Configuration (Production)
# MUST be set via environment variables for security
spring.datasource.url=${DATABASE_URL:jdbc:mysql://db-host:3306/auth_jwt_db?useSSL=true&serverTimezone=UTC}
spring.datasource.username=${DATABASE_USERNAME:root}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT Configuration (Production - MUST use environment variables)
app.jwt.secret=${JWT_SECRET:SET_THIS_ENVIRONMENT_VARIABLE_FOR_PRODUCTION}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging Configuration (Production - warn level)
logging.level.root=WARN
logging.level.com.tugas=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Swagger/OpenAPI Configuration (Disabled in production)
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.enabled=false

# Rate Limiting Configuration (Stricter in production)
app.rate-limit.enabled=true
app.rate-limit.requests-per-minute=50
