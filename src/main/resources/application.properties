# Default Configuration (Development)

# Server Configuration
server.port=8080
server.servlet.context-path=/
spring.application.name=Auth JWT Spring Security

# Database Configuration - Using H2 for easier setup
spring.datasource.url=jdbc:h2:mem:auth_jwt_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# H2 Console (untuk monitoring)
spring.h2.console.enabled=true

# JWT Configuration
app.jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidationPurposeOnly123456789forBetterSecurityUseEnvironmentVariable}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging Configuration
logging.level.root=INFO
logging.level.com.tugas=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Rate Limiting Configuration
app.rate-limit.enabled=true
app.rate-limit.requests-per-minute=100


