# Development Configuration

# Server Configuration
server.port=8080
server.servlet.context-path=/
spring.application.name=Auth JWT Spring Security

# Database Configuration (Development)
spring.datasource.url=jdbc:mysql://localhost:3306/auth_jwt_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect

# JWT Configuration (Development)
# Replace dengan environment variable untuk production: ${JWT_SECRET:default-value}
app.jwt.secret=${JWT_SECRET:mySecretKeyForJWTTokenGenerationAndValidationPurposeOnly123456789}
app.jwt.expiration=${JWT_EXPIRATION:86400000}

# Logging Configuration (Development - verbose)
logging.level.root=INFO
logging.level.com.tugas=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true

# Rate Limiting Configuration
app.rate-limit.enabled=true
app.rate-limit.requests-per-minute=100
